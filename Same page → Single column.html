<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Same page widget → Right rail (B1)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- shared tokens -->
  <link rel="stylesheet" href="davinci/colors_and_type.css">
  <!-- entry screen: mercury dashboard + comparison widget -->
  <link rel="stylesheet" href="offer-mercury.css">
  <link rel="stylesheet" href="mof-widgets.css">
  <link rel="stylesheet" href="mof-dashboard.css">
  <link rel="stylesheet" href="mof-compare.css">
  <!-- destination screen: B1 right-rail offer (Flex + Term on one page) -->
  <link rel="stylesheet" href="sleek.css">
  <link rel="stylesheet" href="sleek-single.css">

  <style>
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      background: #F4F2EC;
      font-family: 'Inter Tight', system-ui, sans-serif;
    }

    /* Use Inter across the embedded dashboard + offer widgets */
    .mof { --mof-display: 'Inter', system-ui, sans-serif; --mof-text: 'Inter', system-ui, sans-serif; }

    /* Font-family override knob (matches the standalone B1 page) */
    html[data-font="inter-tight"] .sk { --sk-font: 'Inter Tight', 'Inter', system-ui, sans-serif; }
    html[data-font="inter"]       .sk { --sk-font: 'Inter', system-ui, sans-serif; }
    html[data-font="geist"]       .sk { --sk-font: 'Geist', 'Inter Tight', system-ui, sans-serif; }

    /* ── Flow stage: two full-screen views that cross-fade + slide ── */
    .flow-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #F4F2EC;
    }
    .flow-screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .flow-screen--dash  { background: #F4F2EC; animation: flowInLeft .4s cubic-bezier(.22,.61,.36,1); }
    .flow-screen--offer { background: #FAFAF7; animation: flowInRight .4s cubic-bezier(.22,.61,.36,1); }

    /* Entrance animations end at the visible base state (opacity:1, no
     * transform), so a frozen/interrupted run can never hold a screen
     * hidden. */
    @keyframes flowInRight { from { transform: translateX(3.5%); } to { transform: none; } }
    @keyframes flowInLeft  { from { transform: translateX(-3.5%); } to { transform: none; } }

    /* 1-column layout: full-width background band, content in a 480px column */
    .flow-screen--offer .sk-page {
      max-width: none;
      width: 100%;
      padding-left: max(24px, calc((100% - 520px) / 2));
      padding-right: max(24px, calc((100% - 520px) / 2));
    }

    /* 1-column layout: radio on its own line, content below it, so the
     * selector cards use the full column width. */
    .flow-screen--offer .sk-card--slim .sk-card-head {
      flex-direction: column;
      gap: 12px;
    }
    /* 1-column layout: stack the two product selectors vertically. */
    .flow-screen--offer .sk-twin {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    /* 1-column layout: stack the two duration selectors vertically. */
    .flow-screen--offer .sk-dur-step {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    /* 1-column layout: stack the "how you'll pay back" illustration (text
     * on top, chart full-width below) so the chart aligns with the text
     * instead of being squeezed into a narrow side column. */
    .flow-screen--offer .sk-single-illus {
      flex-direction: column;
      align-items: stretch;
      gap: 18px;
    }
    .flow-screen--offer .sk-single-illus-shape { width: 100%; }

    /* 1-column layout: the radio now sits on its own line, so the option-card
     * illustration no longer needs the 32px inset that aligned it past the
     * radio — drop it so the illustration lines up with the text. */
    .flow-screen--offer .sk-card--slim .sk-shape { padding-left: 0; }

    /* 1-column layout: move the rate (Daily debit / 10% of daily sales) to
     * the right side of the duration card, beside the duration name. */
    .flow-screen--offer .sk-dur-card-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 16px;
      row-gap: 6px;
      align-items: center;
    }
    .flow-screen--offer .sk-dur-card-nameline,
    .flow-screen--offer .sk-dur-card-pitch,
    .flow-screen--offer .sk-dur-card-adjust { grid-column: 1; }
    .flow-screen--offer .sk-dur-card-rate {
      grid-column: 2;
      grid-row: 1 / -1;
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      text-align: right;
      white-space: nowrap;
    }
    .flow-screen--offer .sk-dur-card {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    /* Disabled-card unlock link: plain left-aligned inline text (not a
     * centered flex) so it wraps naturally beside its arrow — applies to
     * both the disabled Flex product card and the disabled 9-month card. */
    .flow-screen--offer .sk-dur-card-adjust {
      display: inline-block;
      width: auto;
      text-align: left;
    }

    /* 1-column layout: sticky bottom action bar — same borrowing + capital
     * fee summary we show on mobile, pinned to the bottom of the column. */
    .flow-screen--offer .sk--fullpage .sk-cta {
      position: sticky;
      bottom: 16px;
      z-index: 6;
      flex-direction: column;
      align-items: stretch;
      gap: 13px;
      margin: 24px -24px 0;
      padding: 16px 22px;
      border-radius: 18px;
      border-width: 1.5px;
      box-shadow: 0 10px 30px rgba(10, 10, 10, 0.12), 0 1px 2px rgba(10, 10, 10, 0.05);
      background: var(--sk-surface);
    }
    .flow-screen--offer .sk-cta-summary { max-width: none; }
    .flow-screen--offer .sk-cta-summary--amounts {
      display: flex;
      flex-wrap: nowrap;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
      font-size: 13.5px;
      white-space: nowrap;
      color: var(--sk-ink-2);
    }
    .flow-screen--offer .sk-cta-summary--amounts .lbl { color: var(--sk-ink-3); }
    .flow-screen--offer .sk-cta-summary--amounts .sep { color: var(--sk-ink-4); }
    .flow-screen--offer .sk-cta-summary--amounts b {
      color: var(--sk-ink);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .flow-screen--offer .sk-cta-action { align-items: stretch; }
    .flow-screen--offer .sk-cta .sk-btn {
      width: 100%;
      justify-content: center;
      padding: 14px 18px;
      font-size: 15px;
    }

    @media (prefers-reduced-motion: reduce) {
      .flow-screen { animation: none; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#5A4FD6"/>
      <rect x="30" y="44" width="40" height="26" rx="5" fill="#fff"/>
      <path d="M50 44v-6a10 10 0 0 1 20 0" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="50" cy="57" r="4.5" fill="#5A4FD6"/>
    </svg>
  </template>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="offer-shared.jsx"></script>
  <script type="text/babel" src="v1b-stats.jsx"></script>
  <script type="text/babel" src="flex-offer.jsx"></script>
  <script type="text/babel" src="mof-widgets.jsx"></script>
  <script type="text/babel" src="mof-compare.jsx"></script>
  <script type="text/babel" src="sleek-shared.jsx"></script>
  <script type="text/babel" src="sleek-v1b-stats-out.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "brand": "#5A4FD6",
      "partner": "Harbor",
      "amount": 50000,
      "recommend": "none",
      "naming": "product",
      "termShape": "weeks",
      "summaryLevel": "full",
      "supportStyle": "tinted",
      "font": "inter-tight"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // 'dashboard' (the side-by-side columns widget on the partner's page) →
      // 'offer' (the B1 right-rail offer with Flex + Term on one page)
      const [view, setView] = useState('dashboard');
      const [choice, setChoice] = useState('flex');
      const offerRef = useRef(null);

      // One brand drives both design systems
      useEffect(() => {
        const brand = t.brand || '#5A4FD6';
        const root = document.documentElement;
        root.style.setProperty('--sk-brand', brand);
        root.style.setProperty('--sk-brand-hover', mix(brand, '#FFFFFF', 0.12));
        root.style.setProperty('--sk-brand-on', readableOn(brand));
      }, [t.brand]);

      useEffect(() => {
        document.documentElement.setAttribute('data-font', t.font);
      }, [t.font]);

      const goOffer = () => {
        setChoice('flex');                 // open the offer on Flex by default
        setView('offer');
        if (offerRef.current) offerRef.current.scrollTop = 0;
      };
      const goBack = () => setView('dashboard');

      const recommend = t.recommend === 'none' ? null : t.recommend;

      return (
        <React.Fragment>
          <div className="flow-stage">
            {/* ── Screen 1 · the "same page" (side-by-side columns) widget in the partner dashboard ── */}
            {view === 'dashboard' &&
              <div className="flow-screen flow-screen--dash">
                <MofDashboard theme="light" partner={t.partner}>
                  <div className="mofdash-embed" style={{ maxWidth: 820 }}>
                    <CmpColumns onCta={goOffer} />
                  </div>
                </MofDashboard>
              </div>
            }

            {/* ── Screen 2 · the B1 right-rail offer (Flex + Term, sticky review rail) ── */}
            {view === 'offer' &&
              <div className="flow-screen flow-screen--offer" ref={offerRef}>
                <V1bStatsOut
                  amount={t.amount}
                  setAmount={(v) => setTweak('amount', v)}
                  choice={choice} setChoice={setChoice}
                  recommend={recommend}
                  termShapeStyle={t.termShape}
                  naming={t.naming}
                  partnerName={t.partner}
                  previewStyle="panel"
                  supportStyle={t.supportStyle}
                  summaryLevel={t.summaryLevel}
                  layout="stacked"
                  ctaSummary="amounts"
                  fullPage chrome
                  onClose={goBack}
                />
              </div>
            }
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Flow">
              <TweakRadio
                label="Showing"
                value={view}
                options={[
                  { label: 'Widget', value: 'dashboard' },
                  { label: 'Offer',  value: 'offer' },
                ]}
                onChange={(v) => v === 'offer' ? goOffer() : goBack()}
              />
            </TweakSection>

            <TweakSection label="Offer">
              <TweakSlider
                label="Approved amount"
                value={t.amount}
                min={5000} max={50000} step={500}
                onChange={(v) => setTweak('amount', v)}
              />
              <TweakRadio
                label="Recommendation"
                value={t.recommend}
                options={[
                  { label: 'None', value: 'none' },
                  { label: 'Flex', value: 'flex' },
                  { label: 'Term', value: 'term' },
                ]}
                onChange={(v) => setTweak('recommend', v)}
              />
              <TweakRadio
                label="Offer summary"
                value={t.summaryLevel}
                options={[
                  { label: 'Full',      value: 'full' },
                  { label: 'Less info', value: 'minimal' },
                ]}
                onChange={(v) => setTweak('summaryLevel', v)}
              />
            </TweakSection>

            <TweakSection label="Naming">
              <TweakRadio
                label="Framing"
                value={t.naming}
                options={[
                  { label: 'Flex / Term',      value: 'product' },
                  { label: 'Flexible / Fixed', value: 'concept' },
                ]}
                onChange={(v) => setTweak('naming', v)}
              />
            </TweakSection>

            <TweakSection label="Term illustration">
              <TweakSelect
                label="Style"
                value={t.termShape}
                options={[
                  { label: 'Weeks (default)', value: 'weeks' },
                  { label: 'Calendar', value: 'calendar' },
                  { label: 'Dots',     value: 'dots' },
                  { label: 'Equation', value: 'equation' },
                  { label: 'Ticks',    value: 'ticks' },
                  { label: 'Bars',     value: 'bars' },
                ]}
                onChange={(v) => setTweak('termShape', v)}
              />
            </TweakSection>

            <TweakSection label="Schedule-a-call style">
              <TweakRadio
                label="Treatment"
                value={t.supportStyle}
                options={[
                  { label: 'Inline',  value: 'inline' },
                  { label: 'Tinted',  value: 'tinted' },
                  { label: 'Outline', value: 'outline' },
                  { label: 'Card',    value: 'card' },
                ]}
                onChange={(v) => setTweak('supportStyle', v)}
              />
            </TweakSection>

            <TweakSection label="Typography">
              <TweakSelect
                label="Body font"
                value={t.font}
                options={[
                  { label: 'Inter Tight (default)', value: 'inter-tight' },
                  { label: 'Inter',                  value: 'inter' },
                  { label: 'Geist',                  value: 'geist' },
                ]}
                onChange={(v) => setTweak('font', v)}
              />
            </TweakSection>

            <TweakSection label="Brand">
              <TweakColor
                label="Brand color"
                value={t.brand}
                options={['#5A4FD6', '#2A6FDB', '#4F46E5', '#1B5E20', '#B45309', '#0F172A']}
                onChange={(v) => setTweak('brand', v)}
              />
              <TweakText
                label="Partner name"
                value={t.partner}
                onChange={(v) => setTweak('partner', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

    /* Color helpers — hover lift + on-brand text contrast. */
    function hexToRgb(h) {
      const s = String(h).replace('#', '');
      const v = s.length === 3 ? s.split('').map(c => c + c).join('') : s;
      const n = parseInt(v, 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(x =>
        Math.max(0, Math.min(255, Math.round(x))).toString(16).padStart(2, '0')
      ).join('');
    }
    function mix(a, b, t) {
      const [ar, ag, ab] = hexToRgb(a);
      const [br, bg, bb] = hexToRgb(b);
      return rgbToHex(ar + (br - ar) * t, ag + (bg - ag) * t, ab + (bb - ab) * t);
    }
    function relLum([r, g, b]) {
      const lin = (c) => { c /= 255; return c <= 0.03928 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4; };
      return 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
    }
    function readableOn(hex) {
      return relLum(hexToRgb(hex)) > 0.55 ? '#0A0A0A' : '#FFFFFF';
    }
  </script>
</body>
</html>
